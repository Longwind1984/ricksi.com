<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="-apple-system,PingFang SC,sans-serif">
  <defs>
    <!-- 温度场：参照 WeatherLens 真实运行画面（DWD ICON 温度 2m 图层） -->
    <radialGradient id="t1" cx="0.32" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#D4593A"/><stop offset="0.5" stop-color="#E08A3C"/><stop offset="1" stop-color="#E0B23C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t2" cx="0.78" cy="0.25" r="0.45">
      <stop offset="0" stop-color="#3E7D46"/><stop offset="0.6" stop-color="#7DA943"/><stop offset="1" stop-color="#C8C23F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t3" cx="0.1" cy="0.85" r="0.4">
      <stop offset="0" stop-color="#2F6B3D"/><stop offset="1" stop-color="#9DB23F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(16,26,46,0.92)"/><stop offset="1" stop-color="rgba(10,18,34,0.88)"/>
    </linearGradient>
  </defs>
  <rect width="640" height="300" fill="#C9A93E"/>
  <rect width="640" height="300" fill="url(#t1)"/>
  <rect width="640" height="300" fill="url(#t2)"/>
  <rect width="640" height="300" fill="url(#t3)"/>
  <!-- 等值线意象 -->
  <g fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.8">
    <path d="M120 60 Q240 110 380 70 T640 96"/>
    <path d="M40 150 Q200 190 360 150 T640 178"/>
    <path d="M0 232 Q160 268 340 230 T620 254"/>
  </g>
  <!-- 城市标记 -->
  <g font-size="10" fill="#EAF2FA" font-weight="600">
    <circle cx="392" cy="128" r="2.4" fill="#FFFFFF"/><text x="400" y="124">Shanghai</text>
    <circle cx="338" cy="64" r="2.2" fill="#FFFFFF"/><text x="346" y="60">Beijing</text>
    <circle cx="430" cy="232" r="2.2" fill="#FFFFFF"/><text x="438" y="236">Taipei</text>
    <circle cx="560" cy="92" r="2.2" fill="#FFFFFF"/><text x="500" y="88">Tokyo</text>
  </g>
  <!-- 玻璃控制面板（复刻真实 UI） -->
  <rect x="22" y="20" width="218" height="172" rx="16" fill="url(#panel)" stroke="rgba(255,255,255,0.24)" stroke-width="1"/>
  <rect x="22.5" y="20.5" width="217" height="171" rx="15.5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" opacity="0.5"/>
  <text x="38" y="48" font-size="15" font-weight="700" fill="#FFFFFF">WeatherLens</text>
  <rect x="146" y="34" width="76" height="18" rx="9" fill="none" stroke="#4D9FEC" stroke-width="0.8"/>
  <text x="184" y="46.5" font-size="9" fill="#4D9FEC" text-anchor="middle">核心栈验证</text>
  <text x="38" y="78" font-size="10.5" fill="rgba(255,255,255,0.55)">模型</text>
  <rect x="72" y="64" width="150" height="22" rx="7" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
  <text x="82" y="79" font-size="10.5" fill="#EAF2FA">DWD ICON · 全球</text>
  <text x="38" y="110" font-size="10.5" fill="rgba(255,255,255,0.55)">变量</text>
  <rect x="72" y="96" width="150" height="22" rx="7" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
  <text x="82" y="111" font-size="10.5" fill="#EAF2FA">温度 2m</text>
  <text x="38" y="142" font-size="10.5" fill="rgba(255,255,255,0.55)">时间</text>
  <line x1="72" y1="138" x2="222" y2="138" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="92" cy="138" r="6" fill="#4D9FEC"/>
  <text x="38" y="170" font-size="9" fill="rgba(255,255,255,0.5)">123 变量 · 93 时间步 · 图层就绪</text>
  <!-- 缩放控件 -->
  <rect x="588" y="232" width="30" height="56" rx="9" fill="rgba(12,20,38,0.85)" stroke="rgba(255,255,255,0.25)"/>
  <text x="603" y="252" font-size="14" fill="#FFFFFF" text-anchor="middle">+</text>
  <text x="603" y="278" font-size="14" fill="#FFFFFF" text-anchor="middle">−</text>
</svg>
