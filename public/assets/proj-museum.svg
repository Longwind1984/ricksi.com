<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="-apple-system,PingFang SC,sans-serif">
  <rect width="640" height="300" fill="#F0EEE6"/>
  <!-- 复刻自真实 Demo（Museum_Master dist）首屏 -->
  <text x="48" y="44" font-size="10" letter-spacing="4" fill="#A0522D">策展批判型导览 · DEMO</text>
  <text x="46" y="86" font-size="34" font-weight="700" fill="#2B2620" font-family="Songti SC,STSong,serif">山西博物院</text>
  <text x="48" y="110" font-size="11.5" fill="#6B6257">佛风遗韵（示例展厅）—— 不做覆盖型百科，只答"它为什么在这里"</text>
  <line x1="48" y1="126" x2="592" y2="126" stroke="#DDD8CC" stroke-width="1"/>

  <text x="48" y="156" font-size="10" fill="#A0522D">01</text>
  <text x="68" y="158" font-size="15" font-weight="700" fill="#2B2620" font-family="Songti SC,STSong,serif">你的兴趣</text>
  <g font-size="10.5" fill="#3A342C">
    <rect x="48" y="170" width="64" height="24" rx="4" fill="#FFFFFF" stroke="#D8D2C4"/><text x="80" y="186" text-anchor="middle">北朝政治史</text>
    <rect x="120" y="170" width="58" height="24" rx="4" fill="#A0522D"/><text x="149" y="186" text-anchor="middle" fill="#FFFFFF">图像程序</text>
    <rect x="186" y="170" width="64" height="24" rx="4" fill="#FFFFFF" stroke="#D8D2C4"/><text x="218" y="186" text-anchor="middle">合法性叙事</text>
    <rect x="258" y="170" width="58" height="24" rx="4" fill="#A0522D"/><text x="287" y="186" text-anchor="middle" fill="#FFFFFF">佛教艺术</text>
    <rect x="324" y="170" width="58" height="24" rx="4" fill="#FFFFFF" stroke="#D8D2C4"/><text x="353" y="186" text-anchor="middle">本地传统</text>
  </g>

  <text x="48" y="226" font-size="10" fill="#A0522D">02</text>
  <text x="68" y="228" font-size="15" font-weight="700" fill="#2B2620" font-family="Songti SC,STSong,serif">优先级路线</text>
  <g font-size="10.5">
    <rect x="48" y="240" width="52" height="22" rx="4" fill="#FFFFFF" stroke="#D8D2C4"/><text x="74" y="255" text-anchor="middle" fill="#3A342C">30 分钟</text>
    <rect x="108" y="240" width="52" height="22" rx="4" fill="#A0522D"/><text x="134" y="255" text-anchor="middle" fill="#FFFFFF">60 分钟</text>
    <rect x="168" y="240" width="56" height="22" rx="4" fill="#FFFFFF" stroke="#D8D2C4"/><text x="196" y="255" text-anchor="middle" fill="#3A342C">120 分钟</text>
  </g>
  <text x="48" y="284" font-size="11" fill="#A0522D">建议下一件：<tspan font-weight="700">涅槃变碑</tspan> · 建议先用「图像学」镜头打开</text>

  <!-- 右侧路线列表 -->
  <g>
    <text x="392" y="172" font-size="10" fill="#A0522D">01</text>
    <text x="416" y="173" font-size="13" font-weight="600" fill="#2B2620">涅槃变碑</text>
    <text x="416" y="190" font-size="9.5" fill="#8A8174">北朝政治史 · 图像程序 · 约 25 分钟</text>
    <line x1="392" y1="204" x2="592" y2="204" stroke="#E2DDD1"/>
    <text x="392" y="226" font-size="10" fill="#A0522D">02</text>
    <text x="416" y="227" font-size="13" font-weight="600" fill="#2B2620">韦驮造像</text>
    <text x="416" y="244" font-size="9.5" fill="#8A8174">佛教艺术 · 断代方法 · 约 15 分钟</text>
    <line x1="392" y1="258" x2="592" y2="258" stroke="#E2DDD1"/>
    <text x="392" y="280" font-size="10" fill="#A0522D">03</text>
    <text x="416" y="281" font-size="13" fill="#9A9184">（第三件，自填）</text>
  </g>
</svg>
