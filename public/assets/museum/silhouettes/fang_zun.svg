       L 72 56 L 72 76
       L 80 82 L 80 88 L 20 88 L 20 82 L 28 76 L 28 56
       L 20 50 L 8 48 L 8 44 L 18 38 L 18 26 L 8 22 Z
  "/>
  <!-- left ram horn -->
