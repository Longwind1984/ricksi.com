  <!-- right ear -->
  <path fill="#a4732c" d="M 78 38 L 96 24 L 98 36 L 90 52 L 78 60 Z"/>
  <!-- left protruding eye cylinder -->
  <path fill="#a4732c" d="M 32 44 a 6 6 0 1 1 0.01 0 Z M 26 44 L 14 44 L 14 50 L 26 50 Z"/>
  <!-- right protruding eye cylinder -->
  <path fill="#a4732c" d="M 68 44 a 6 6 0 1 1 0.01 0 Z M 74 44 L 86 44 L 86 50 L 74 50 Z"/>
  <!-- mouth -->
  <path fill="#a4732c" d="M 38 66 L 62 66 L 60 72 L 40 72 Z"/>
