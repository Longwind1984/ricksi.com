<!-- 三星堆纵目面具 (Sanxingdui zongmu mask, protruding-eyes & flared ears mask), 商, 三星堆 K2; 三星堆博物馆藏. viewBox 100x100. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <!-- The face core: trapezoidal head + giant flared ears + cylindrical bulging eyes that visually pop forward -->
