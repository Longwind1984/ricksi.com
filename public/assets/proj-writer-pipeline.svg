<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" font-family="ui-monospace,SF Mono,Menlo,monospace">
  <defs>
    <linearGradient id="wp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10203E"/><stop offset="1" stop-color="#091223"/>
    </linearGradient>
    <linearGradient id="wp-win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.12)"/><stop offset="1" stop-color="rgba(255,255,255,0.045)"/>
    </linearGradient>
    <linearGradient id="wp-scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(77,159,236,0)"/><stop offset="0.5" stop-color="rgba(120,180,255,0.9)"/><stop offset="1" stop-color="rgba(77,159,236,0)"/>
    </linearGradient>
    <filter id="wp-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="300" fill="url(#wp-bg)"/>
  <!-- 远山轮廓 -->
  <path d="M0 268 L90 218 L170 252 L260 200 L350 248 L470 196 L560 240 L640 212 L640 300 L0 300 Z" fill="#0B1730" opacity="0.85"/>
  <path d="M0 276 L80 238 L180 266 L300 224 L420 262 L540 228 L640 252 L640 300 L0 300 Z" fill="#081020" opacity="0.9"/>

  <!-- 手稿玻璃面板 -->
  <g filter="url(#wp-glow)" opacity="0.3"><rect x="150" y="40" width="340" height="208" rx="18" fill="#4D9FEC" opacity="0.16"/></g>
  <rect x="150" y="40" width="340" height="208" rx="18" fill="url(#wp-win)" stroke="rgba(255,255,255,0.26)" stroke-width="1.2"/>
  <rect x="150.6" y="40.6" width="338.8" height="206.8" rx="17.4" fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="0.6" opacity="0.6"/>

  <!-- 标题行 -->
  <text x="172" y="68" font-size="11" fill="rgba(180,210,255,0.62)" letter-spacing="0.06em">AI 味 · 逐句 X 光</text>
  <circle cx="466" cy="64" r="4" fill="#54C39A"/><circle cx="452" cy="64" r="4" fill="#E0B252"/><circle cx="438" cy="64" r="4" fill="#E0786A"/>

  <!-- 段落文本行（faint = 未标注） -->
  <g>
    <rect x="172" y="92"  width="296" height="9" rx="4.5" fill="rgba(190,210,255,0.20)"/>
    <rect x="172" y="110" width="270" height="9" rx="4.5" fill="rgba(190,210,255,0.20)"/>
    <!-- A 留：场景长出来的承重句（绿） -->
    <rect x="172" y="128" width="230" height="9" rx="4.5" fill="rgba(84,195,154,0.5)"/>
    <rect x="408" y="128" width="60" height="9" rx="4.5" fill="rgba(84,195,154,0.5)"/>
    <rect x="172" y="146" width="296" height="9" rx="4.5" fill="rgba(190,210,255,0.20)"/>
    <!-- B 可疑（琥珀） -->
    <rect x="172" y="164" width="210" height="9" rx="4.5" fill="rgba(224,178,82,0.5)"/>
    <!-- C 砍：为风格而风格（红，带划除线） -->
    <rect x="172" y="182" width="250" height="9" rx="4.5" fill="rgba(224,120,106,0.42)"/>
    <line x1="172" y1="186.5" x2="422" y2="186.5" stroke="#E0786A" stroke-width="1.4"/>
    <rect x="172" y="200" width="180" height="9" rx="4.5" fill="rgba(190,210,255,0.20)"/>
  </g>

  <!-- 判档徽标 -->
  <text x="478" y="135" font-size="11" fill="#54C39A" text-anchor="end" font-weight="700">A</text>
  <text x="478" y="171" font-size="11" fill="#E0B252" text-anchor="end" font-weight="700">B</text>
  <text x="478" y="189" font-size="11" fill="#E0786A" text-anchor="end" font-weight="700">C</text>

  <!-- 扫描线 -->
  <g filter="url(#wp-glow)">
    <rect x="150" y="150" width="340" height="2.4" fill="url(#wp-scan)">
      <animate attributeName="y" values="92;208;92" dur="3.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- 配额脚注 -->
  <text x="320" y="234" text-anchor="middle" font-size="10" fill="rgba(180,210,255,0.45)">金句配额 · 一篇只够 1–2 记真甩尾</text>
</svg>
