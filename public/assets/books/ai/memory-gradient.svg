<svg xmlns="http://www.w3.org/2000/svg" width="500" height="800" viewBox="0 0 500 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#192443"/>
      <stop offset="0.55" stop-color="#121A33"/>
      <stop offset="1" stop-color="#0D1226"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8FBEFF"/>
      <stop offset="0.5" stop-color="#6FA8FF"/>
      <stop offset="1" stop-color="#2D4570"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6FA8FF" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#6FA8FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="500" height="800" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="499" height="799" fill="none" stroke="#26314E" stroke-width="1"/>

  <!-- faint blueprint grid lines -->
  <g stroke="#212B49" stroke-width="0.6">
    <line x1="40" y1="300" x2="460" y2="300"/>
    <line x1="40" y1="380" x2="460" y2="380"/>
    <line x1="40" y1="460" x2="460" y2="460"/>
    <line x1="40" y1="540" x2="460" y2="540"/>
  </g>

  <!-- top meta bar -->
  <text x="40" y="54" font-size="12" letter-spacing="3" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">记忆机制 / MEMORY</text>
  <text x="460" y="54" text-anchor="end" font-size="12" letter-spacing="3" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">PLATE No.3 · 衰减谱</text>
  <line x1="40" y1="70" x2="460" y2="70" stroke="#2A3350" stroke-width="1"/>
  <text x="40" y="90" font-size="10" letter-spacing="1.5" fill="#5A6486" font-family="ui-monospace, Menlo, monospace">MEMORY STRENGTH DECAYS WITH RETRIEVAL DISTANCE</text>

  <!-- title -->
  <text x="40" y="148" font-size="58" font-weight="700" fill="#F2EFE6" font-family="Songti SC, Noto Serif SC, STSong, serif">记忆的梯度</text>
  <rect x="42" y="170" width="64" height="5" fill="#6FA8FF"/>
  <!-- subtitle -->
  <text x="40" y="212" font-size="19" fill="#6FA8FF" font-family="PingFang SC, Noto Sans SC, sans-serif">从 KV Cache 到外置记忆的衰减谱系</text>

  <!-- ===== central motif: decay spectrum ===== -->
  <g font-family="ui-monospace, Menlo, monospace">

    <!-- axis labels -->
    <text x="40" y="270" font-size="11" letter-spacing="1.5" fill="#8E97B3">记忆强度 R(d)</text>
    <text x="460" y="270" text-anchor="end" font-size="11" letter-spacing="1.5" fill="#6E7790">高保真 → 有损检索</text>

    <!-- y-axis tick scale -->
    <g fill="#5A647F" font-size="9">
      <text x="34" y="304" text-anchor="end">1.0</text>
      <text x="34" y="384" text-anchor="end">0.6</text>
      <text x="34" y="464" text-anchor="end">0.3</text>
      <text x="34" y="544" text-anchor="end">0.1</text>
    </g>

    <!-- decay-constant tag (top-right of plot) -->
    <text x="448" y="316" text-anchor="end" font-size="11" fill="#6FA8FF" opacity="0.9">R(d) = e^(-k·d)</text>
    <text x="448" y="332" text-anchor="end" font-size="9" fill="#5A647F">情景 → 压缩为可复用规则</text>

    <!-- decay curve: fill + dashed stroke -->
    <path d="M52,296 C120,300 150,340 200,372 C250,404 280,450 330,486 C380,520 420,540 448,548 L448,560 L52,560 Z" fill="url(#fade)"/>
    <path d="M52,296 C120,300 150,340 200,372 C250,404 280,450 330,486 C380,520 420,540 448,548" fill="none" stroke="#6FA8FF" stroke-width="1.6" stroke-dasharray="1 5" stroke-linecap="round" opacity="0.85"/>

    <!-- decay bars: 5 memory tiers, descending -->
    <rect x="56" y="300" width="46" height="260" rx="2" fill="url(#bar)" opacity="0.95"/>
    <rect x="56" y="300" width="46" height="260" rx="2" fill="none" stroke="#9CC4FF" stroke-width="0.8" opacity="0.5"/>

    <rect x="138" y="356" width="46" height="204" rx="2" fill="url(#bar)" opacity="0.80"/>
    <rect x="138" y="356" width="46" height="204" rx="2" fill="none" stroke="#9CC4FF" stroke-width="0.8" opacity="0.4"/>

    <rect x="220" y="420" width="46" height="140" rx="2" fill="url(#bar)" opacity="0.62"/>
    <rect x="220" y="420" width="46" height="140" rx="2" fill="none" stroke="#9CC4FF" stroke-width="0.8" opacity="0.35"/>

    <rect x="302" y="476" width="46" height="84" rx="2" fill="url(#bar)" opacity="0.46"/>
    <rect x="302" y="476" width="46" height="84" rx="2" fill="none" stroke="#9CC4FF" stroke-width="0.8" opacity="0.3"/>

    <rect x="384" y="520" width="46" height="40" rx="2" fill="url(#bar)" opacity="0.34"/>
    <rect x="384" y="520" width="46" height="40" rx="2" fill="none" stroke="#9CC4FF" stroke-width="0.8" opacity="0.25"/>

    <!-- baseline -->
    <line x1="40" y1="560" x2="460" y2="560" stroke="#3A4566" stroke-width="1.2"/>

    <!-- tier index dots on baseline -->
    <g fill="#6FA8FF">
      <circle cx="79" cy="560" r="2.4"/>
      <circle cx="161" cy="560" r="2.4"/>
      <circle cx="243" cy="560" r="2.4"/>
      <circle cx="325" cy="560" r="2.4"/>
      <circle cx="407" cy="560" r="2.4"/>
    </g>

    <!-- tier names -->
    <g font-size="10" fill="#9AA4C0" text-anchor="middle">
      <text x="79" y="580">KV Cache</text>
      <text x="161" y="580">注意力窗口</text>
      <text x="243" y="580">检索缓存</text>
      <text x="325" y="580">向量库</text>
      <text x="407" y="580">外置记忆</text>
    </g>
    <!-- distance ticks -->
    <g font-size="8" fill="#5A647F" text-anchor="middle" letter-spacing="0.5">
      <text x="79" y="594">d=0</text>
      <text x="161" y="594">d≈1k</text>
      <text x="243" y="594">d≈10k</text>
      <text x="325" y="594">d≈10⁵</text>
      <text x="407" y="594">d→∞</text>
    </g>

    <!-- access-cost annotation row -->
    <text x="79"  y="612" font-size="8" fill="#46506E" text-anchor="middle">即时命中</text>
    <text x="243" y="612" font-size="8" fill="#46506E" text-anchor="middle">软召回</text>
    <text x="407" y="612" font-size="8" fill="#46506E" text-anchor="middle">显式检索</text>

    <!-- callout marker on last tier -->
    <line x1="407" y1="520" x2="407" y2="498" stroke="#6FA8FF" stroke-width="0.8" opacity="0.6"/>
    <circle cx="407" cy="498" r="2" fill="none" stroke="#6FA8FF" stroke-width="0.8"/>
    <text x="407" y="488" font-size="8" fill="#6FA8FF" text-anchor="middle" opacity="0.85">技能化沉淀</text>
  </g>

  <!-- principle strip -->
  <line x1="40" y1="640" x2="460" y2="640" stroke="#202B47" stroke-width="1"/>
  <text x="40" y="672" font-size="15" fill="#C9CEDE" font-family="Songti SC, Noto Serif SC, STSong, serif">记忆不是有无之别，而是一条沿距离衰减的连续谱。</text>
  <text x="40" y="694" font-size="11" letter-spacing="1.5" fill="#4E5E80" font-family="ui-monospace, Menlo, monospace">MEMORY IS A GRADIENT, NOT A BINARY.</text>

  <!-- footer -->
  <line x1="40" y1="716" x2="460" y2="716" stroke="#2A3350" stroke-width="1"/>
  <text x="40" y="746" font-size="13" fill="#8E97B3" font-family="ui-monospace, Menlo, monospace">概念信息图 · 中篇 · 2026</text>
  <text x="40" y="770" font-size="13" fill="#6E7790" font-family="PingFang SC, Noto Sans SC, sans-serif">Rick × Claude</text>
  <text x="460" y="770" text-anchor="end" font-size="11" letter-spacing="2" fill="#3E486A" font-family="ui-monospace, Menlo, monospace">R(d) · e^-kd</text>
</svg>
