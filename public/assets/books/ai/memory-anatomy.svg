    <path d="M150 500 l9 9 -9 9 -9 -9 z" fill="#5FD0C0" opacity="0.9"/>
    <path d="M350 500 l9 9 -9 9 -9 -9 z" fill="none" stroke="#5FD0C0" stroke-width="1.4" stroke-dasharray="2.5 2.5"/>
    <path d="M159 509 H341" stroke="#5FD0C0" stroke-width="0.8" stroke-dasharray="1 5" opacity="0.5"/>
    <line x1="124" y1="509" x2="64" y2="509" stroke="#5FD0C0" stroke-width="0.8" opacity="0.7"/>
    <circle cx="64" cy="509" r="2" fill="#5FD0C0"/>
    <text x="60" y="505" text-anchor="end" font-size="11" fill="#CFE9E3" font-family="PingFang SC, Noto Sans SC, sans-serif">检索</text>
    <text x="60" y="519" text-anchor="end" font-size="8.5" fill="#6E7790">线索重建</text>
    <line x1="376" y1="509" x2="436" y2="509" stroke="#5FD0C0" stroke-width="0.8" opacity="0.7"/>
