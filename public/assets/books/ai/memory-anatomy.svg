    <text x="60" y="428" text-anchor="end" font-size="11" fill="#CFE9E3" font-family="PingFang SC, Noto Sans SC, sans-serif">巩固</text>
    <text x="60" y="442" text-anchor="end" font-size="8.5" fill="#6E7790">睡眠回放</text>
    <line x1="380" y1="432" x2="436" y2="432" stroke="#5FD0C0" stroke-width="0.8" opacity="0.7"/>
    <circle cx="436" cy="432" r="2" fill="#5FD0C0"/>
