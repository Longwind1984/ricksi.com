  <rect width="500" height="800" fill="url(#vig)"/>

  <!-- bottom credit -->
  <line x1="40" y1="704" x2="460" y2="704" stroke="#2A3350" stroke-width="1"/>
  <text x="40" y="734" font-size="13" letter-spacing="1" fill="#8E97B3" font-family="ui-monospace, Menlo, monospace">深度综述 · 一个词的两副身体 · 2026</text>
  <text x="40" y="760" font-size="13" fill="#6E7790" font-family="PingFang SC, Noto Sans SC, sans-serif">Rick × Claude</text>
  <text x="460" y="760" text-anchor="end" font-size="11" letter-spacing="1" fill="#5E6B8C" font-family="ui-monospace, Menlo, monospace">FIG · A↔B</text>
</svg>
