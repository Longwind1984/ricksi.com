<svg xmlns="http://www.w3.org/2000/svg" width="500" height="800" viewBox="0 0 500 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#19223C"/>
      <stop offset="0.55" stop-color="#121A30"/>
      <stop offset="1" stop-color="#0D1124"/>
    </linearGradient>
    <linearGradient id="spec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5FD0C0" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#5FD0C0" stop-opacity="0.03"/>
