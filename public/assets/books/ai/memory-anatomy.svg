    <circle cx="350" cy="366" r="6.5" fill="none" stroke="#5FD0C0" stroke-width="1.4" stroke-dasharray="2.5 2.5"/>
    <!-- cross-map link -->
    <path d="M158 366 H342" stroke="#5FD0C0" stroke-width="0.8" stroke-dasharray="1 5" opacity="0.5"/>
