    <path d="M157 580 H343" stroke="#5FD0C0" stroke-width="0.8" stroke-dasharray="1 5" opacity="0.5"/>
    <line x1="122" y1="580" x2="64" y2="580" stroke="#5FD0C0" stroke-width="0.8" opacity="0.7"/>
    <circle cx="64" cy="580" r="2" fill="#5FD0C0"/>
    <text x="60" y="576" text-anchor="end" font-size="11" fill="#CFE9E3" font-family="PingFang SC, Noto Sans SC, sans-serif">遗忘</text>
    <text x="60" y="590" text-anchor="end" font-size="8.5" fill="#6E7790">衰减曲线</text>
    <line x1="378" y1="580" x2="436" y2="580" stroke="#5FD0C0" stroke-width="0.8" opacity="0.7"/>
    <circle cx="436" cy="580" r="2" fill="#5FD0C0"/>
    <text x="440" y="576" font-size="11" fill="#CFE9E3" font-family="PingFang SC, Noto Sans SC, sans-serif">遗忘</text>
