  <text x="460" y="54" text-anchor="end" font-size="12" letter-spacing="3" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">PLATE No.2 · 解剖标本</text>
  <line x1="40" y1="70" x2="460" y2="70" stroke="#2A3350" stroke-width="1"/>

  <!-- title -->
