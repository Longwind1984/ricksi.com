    <text x="350" y="300" text-anchor="middle" font-size="11.5" letter-spacing="2" fill="#9BE4D8" font-family="PingFang SC, Noto Sans SC, sans-serif">LLM · 身体 B</text>
    <text x="150" y="316" text-anchor="middle" font-size="9.5" letter-spacing="1.5" fill="#5E6B8C">SPECIMEN · LAT.</text>
    <text x="350" y="316" text-anchor="middle" font-size="9.5" letter-spacing="1.5" fill="#5E6B8C">SPECIMEN · MED.</text>

