    <rect x="142" y="424" width="16" height="16" rx="2" fill="#5FD0C0" opacity="0.85"/>
    <rect x="342" y="424" width="16" height="16" rx="2" fill="none" stroke="#5FD0C0" stroke-width="1.4" stroke-dasharray="2.5 2.5"/>
    <path d="M158 432 H342" stroke="#5FD0C0" stroke-width="0.8" stroke-dasharray="1 5" opacity="0.5"/>
    <line x1="120" y1="432" x2="64" y2="432" stroke="#5FD0C0" stroke-width="0.8" opacity="0.7"/>
