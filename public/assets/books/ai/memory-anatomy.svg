  <text x="40" y="204" font-size="42" font-weight="700" fill="#F2EFE6" font-family="Songti SC, Noto Serif SC, STSong, serif">一个词的解剖</text>
  <rect x="42" y="222" width="64" height="5" fill="#5FD0C0"/>
  <text x="40" y="256" font-size="17" fill="#5FD0C0" font-family="PingFang SC, Noto Sans SC, sans-serif">同一个词，在认知科学与 LLM 里的两种身体</text>

