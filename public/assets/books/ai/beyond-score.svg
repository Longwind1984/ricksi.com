<svg xmlns="http://www.w3.org/2000/svg" width="500" height="800" viewBox="0 0 500 800" role="img" aria-labelledby="t d">
  <title id="t">分数之外 — 基准分之外的能力信号</title>
  <desc id="d">封面信息图：一根孤立的基准分数条之外，散布着雷达星座般更丰富的能力信号点。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A2138"/>
      <stop offset="1" stop-color="#0E1428"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.62" cy="0.46" r="0.62">
      <stop offset="0" stop-color="#BFD24C" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#BFD24C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="500" height="800" fill="url(#bg)"/>
  <rect width="500" height="800" fill="url(#halo)"/>

  <!-- ===== 顶部 mono 元信息条 ===== -->
  <text x="40" y="54" font-size="12" letter-spacing="3" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">评测与分数</text>
  <text x="460" y="54" text-anchor="end" font-size="12" letter-spacing="3" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">PLATE No.6</text>
  <line x1="40" y1="70" x2="460" y2="70" stroke="#2A3350" stroke-width="1"/>
  <text x="40" y="90" font-size="10" letter-spacing="2" fill="#566085" font-family="ui-monospace, Menlo, monospace">SINGLE SCORE &#8594; MULTI-DIMENSIONAL SIGNAL FIELD</text>

  <!-- ===== 大标题 ===== -->
  <text x="40" y="156" font-size="64" font-weight="700" fill="#F2EFE6" font-family="Songti SC, Noto Serif SC, STSong, serif">分数之外</text>
  <rect x="42" y="178" width="64" height="5" fill="#BFD24C"/>
  <text x="40" y="222" font-size="19" fill="#BFD24C" font-family="PingFang SC, Noto Sans SC, sans-serif">基准分之外的能力信号</text>
  <text x="40" y="246" font-size="13" fill="#8E97B3" font-family="PingFang SC, Noto Sans SC, sans-serif">一个数字看不见的那些维度</text>

  <!-- 中央 motif: 左=孤立基准分数条  右=能力信号雷达星座 -->
  <g font-family="ui-monospace, Menlo, monospace">

    <!-- 左侧：孤立的基准分数条 -->
    <rect x="62" y="300" width="46" height="320" fill="none" stroke="#2A3350" stroke-width="1"/>
    <g stroke="#2A3350" stroke-width="1">
      <line x1="62" y1="332" x2="108" y2="332"/>
      <line x1="62" y1="396" x2="108" y2="396"/>
      <line x1="62" y1="460" x2="108" y2="460"/>
      <line x1="62" y1="524" x2="108" y2="524"/>
      <line x1="62" y1="588" x2="108" y2="588"/>
    </g>
    <g font-size="9" fill="#566085" text-anchor="end">
      <text x="56" y="335">100</text>
      <text x="56" y="463">50</text>
      <text x="56" y="623">0</text>
    </g>
    <!-- 分数条本体 -->
    <rect x="74" y="370" width="22" height="250" fill="#BFD24C" fill-opacity="0.85"/>
    <rect x="74" y="370" width="22" height="250" fill="none" stroke="#BFD24C" stroke-width="1"/>
    <!-- 顶端读数引线 -->
    <line x1="62" y1="370" x2="160" y2="370" stroke="#BFD24C" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="118" y="367" font-size="13" fill="#F2EFE6" letter-spacing="1">78.4</text>
    <text x="118" y="381" font-size="9" fill="#8E97B3">BENCHMARK</text>
    <!-- 列标注 -->
    <text x="85" y="642" font-size="10" fill="#8E97B3" text-anchor="middle">单一基准分</text>
    <text x="85" y="656" font-size="8" fill="#566085" text-anchor="middle">ONE NUMBER</text>

    <!-- 分隔：之外 -->
    <line x1="178" y1="296" x2="178" y2="624" stroke="#2A3350" stroke-width="1" stroke-dasharray="1 5"/>
    <text x="190" y="300" font-size="9" fill="#566085" letter-spacing="2">&#8212; BEYOND &#8212;</text>

    <!-- 右侧：能力信号雷达星座（中心 330,460） -->
    <g stroke="#2A3350" stroke-width="1" fill="none">
      <polygon points="330,360 425,428 388,540 272,540 235,428"/>
      <polygon points="330,394 393,439 368,514 292,514 267,439"/>
      <polygon points="330,428 361,450 349,488 311,488 299,450"/>
    </g>
    <g stroke="#2A3350" stroke-width="1">
      <line x1="330" y1="460" x2="330" y2="360"/>
      <line x1="330" y1="460" x2="425" y2="428"/>
      <line x1="330" y1="460" x2="388" y2="540"/>
      <line x1="330" y1="460" x2="272" y2="540"/>
      <line x1="330" y1="460" x2="235" y2="428"/>
    </g>
    <!-- 实测信号多边形（不规则） -->
    <polygon points="330,378 408,435 360,528 286,520 258,433"
             fill="#BFD24C" fill-opacity="0.12" stroke="#BFD24C" stroke-width="1.5"/>
    <g fill="#BFD24C">
      <circle cx="330" cy="378" r="3.5"/>
      <circle cx="408" cy="435" r="3.5"/>
      <circle cx="360" cy="528" r="3.5"/>
      <circle cx="286" cy="520" r="3.5"/>
      <circle cx="258" cy="433" r="3.5"/>
    </g>
    <!-- 维度标签 -->
    <g font-size="10" fill="#C9CFE0">
      <text x="330" y="350" text-anchor="middle">鲁棒性</text>
      <text x="436" y="426" text-anchor="start">校准度</text>
      <text x="398" y="558" text-anchor="middle">诚实</text>
      <text x="262" y="558" text-anchor="middle">泛化</text>
      <text x="224" y="426" text-anchor="end">推理</text>
    </g>
    <g font-size="7.5" fill="#566085">
      <text x="330" y="340" text-anchor="middle">ROBUST</text>
      <text x="436" y="437" text-anchor="start">CALIB.</text>
      <text x="262" y="568" text-anchor="middle">GENER.</text>
      <text x="224" y="437" text-anchor="end">REASON</text>
    </g>

    <!-- 散落未被分数捕获的信号点（星座） -->
    <g fill="#BFD24C" fill-opacity="0.55">
      <circle cx="200" cy="332" r="2"/>
      <circle cx="452" cy="372" r="2.5"/>
      <circle cx="240" cy="600" r="2"/>
      <circle cx="430" cy="600" r="2"/>
      <circle cx="448" cy="500" r="1.6"/>
      <circle cx="208" cy="500" r="1.6"/>
      <circle cx="412" cy="330" r="1.6"/>
    </g>
    <g stroke="#BFD24C" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="2 4" fill="none">
      <line x1="408" y1="435" x2="452" y2="372"/>
      <line x1="360" y1="528" x2="430" y2="600"/>
      <line x1="258" y1="433" x2="208" y2="500"/>
      <line x1="330" y1="378" x2="412" y2="330"/>
      <line x1="286" y1="520" x2="240" y2="600"/>
    </g>
    <text x="452" y="362" font-size="8" fill="#8E97B3" text-anchor="middle">+ 信号</text>
    <text x="430" y="616" font-size="8" fill="#8E97B3" text-anchor="middle">+ 信号</text>

    <!-- 离群标注（工程图风高亮） -->
    <circle cx="408" cy="435" r="6" fill="none" stroke="#BFD24C" stroke-width="1" stroke-opacity="0.6"/>

    <!-- motif 底部读数条 -->
    <text x="178" y="638" font-size="9" fill="#566085">DIM = 1</text>
    <text x="330" y="638" font-size="9" fill="#566085" text-anchor="middle">DIM = n &#8211; 1 (UNSEEN BY SCORE)</text>

  </g>

  <!-- ===== 底部分隔线 + credit ===== -->
  <line x1="40" y1="700" x2="460" y2="700" stroke="#2A3350" stroke-width="1"/>
  <text x="40" y="730" font-size="13" fill="#8E97B3" letter-spacing="1" font-family="ui-monospace, Menlo, monospace">导读 · 长文 · 2026</text>
  <text x="460" y="730" font-size="13" fill="#8E97B3" letter-spacing="1" text-anchor="end" font-family="ui-monospace, Menlo, monospace">SIGNAL &gt; SCORE</text>
  <text x="40" y="758" font-size="13" fill="#6E7790" font-family="PingFang SC, Noto Sans SC, sans-serif">Rick's Opus 4.8 Extra</text>
</svg>
