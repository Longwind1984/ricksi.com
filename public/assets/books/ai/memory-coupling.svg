<svg xmlns="http://www.w3.org/2000/svg" width="500" height="800" viewBox="0 0 500 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A2138"/>
      <stop offset="1" stop-color="#0E1428"/>
    </linearGradient>
    <linearGradient id="strataA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A98BE0" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#A98BE0" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="strataB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A98BE0" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#A98BE0" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="strataC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A98BE0" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#A98BE0" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="strataD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A98BE0" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#A98BE0" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="couplingAxis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9B6F0"/>
      <stop offset="1" stop-color="#3A4468"/>
    </linearGradient>
  </defs>

  <rect width="500" height="800" fill="url(#bg)"/>

  <!-- faint blueprint grid -->
  <g stroke="#2A3350" stroke-width="0.5" opacity="0.35">
    <line x1="40" y1="300" x2="460" y2="300"/>
    <line x1="40" y1="400" x2="460" y2="400"/>
    <line x1="40" y1="500" x2="460" y2="500"/>
    <line x1="40" y1="600" x2="460" y2="600"/>
    <line x1="125" y1="280" x2="125" y2="660"/>
    <line x1="250" y1="280" x2="250" y2="660"/>
    <line x1="375" y1="280" x2="375" y2="660"/>
  </g>

  <!-- top mono meta bar -->
  <text x="40" y="54" font-size="12" letter-spacing="3" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">记忆机制</text>
  <text x="460" y="54" text-anchor="end" font-size="12" letter-spacing="3" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">PLATE No.4 · COUPLING</text>
  <line x1="40" y1="70" x2="460" y2="70" stroke="#2A3350" stroke-width="1"/>

  <!-- title -->
  <text x="40" y="138" font-size="52" font-weight="700" fill="#F2EFE6" font-family="Songti SC, Noto Serif SC, STSong, serif">记忆的四种耦合</text>
  <rect x="42" y="158" width="64" height="5" fill="#A98BE0"/>
  <!-- subtitle -->
  <text x="40" y="200" font-size="18" fill="#A98BE0" font-family="PingFang SC, Noto Sans SC, sans-serif">AI 记忆机制的分层解剖</text>
  <text x="40" y="226" font-size="18" fill="#A98BE0" font-family="PingFang SC, Noto Sans SC, sans-serif">从权重到图谱</text>

  <!-- ============ CENTRAL MOTIF : four coupling strata ============ -->
  <text x="40" y="268" font-size="10.5" letter-spacing="1.5" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">COUPLING ↓ 解耦渐强   ACCESS ↓ 越来越外置</text>

  <g font-family="ui-monospace, Menlo, monospace" fill="#6E7790" font-size="11">
    <line x1="40" y1="288" x2="40" y2="652" stroke="url(#couplingAxis)" stroke-width="2"/>
    <circle cx="40" cy="318" r="3" fill="#C9B6F0"/>
    <circle cx="40" cy="408" r="3" fill="#9C82C9"/>
    <circle cx="40" cy="498" r="3" fill="#6E63A0"/>
    <circle cx="40" cy="588" r="3" fill="#3A4468"/>
  </g>

  <!-- Layer L1 : 权重内化 -->
  <g>
    <rect x="56" y="290" width="404" height="78" rx="4" fill="url(#strataA)" stroke="#A98BE0" stroke-width="1.4" stroke-opacity="0.85"/>
    <text x="72" y="318" font-size="22" font-weight="700" fill="#F2EFE6" font-family="Songti SC, Noto Serif SC, serif">权重内化</text>
    <text x="72" y="340" font-size="11.5" fill="#A6AFC9" font-family="PingFang SC, Noto Sans SC, sans-serif">参数即记忆 · 训练时固化 · 不可逐条编辑</text>
    <text x="72" y="358" font-size="10" letter-spacing="1" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">L1 · WEIGHTS · pre-train / fine-tune</text>
    <rect x="370" y="312" width="74" height="7" rx="3.5" fill="#2A3350"/>
    <rect x="370" y="312" width="74" height="7" rx="3.5" fill="#A98BE0"/>
    <text x="444" y="338" text-anchor="end" font-size="10" fill="#C9B6F0" font-family="ui-monospace, Menlo, monospace">耦合 1.00</text>
  </g>

  <!-- Layer L2 : 上下文 -->
  <g>
    <rect x="56" y="380" width="404" height="78" rx="4" fill="url(#strataB)" stroke="#A98BE0" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="72" y="408" font-size="22" font-weight="700" fill="#F2EFE6" font-family="Songti SC, Noto Serif SC, serif">上下文</text>
    <text x="72" y="430" font-size="11.5" fill="#A6AFC9" font-family="PingFang SC, Noto Sans SC, sans-serif">窗口即工作记忆 · 即时可写 · 会话结束即失</text>
    <text x="72" y="448" font-size="10" letter-spacing="1" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">L2 · CONTEXT · KV-cache / window</text>
    <rect x="370" y="402" width="74" height="7" rx="3.5" fill="#2A3350"/>
    <rect x="370" y="402" width="49" height="7" rx="3.5" fill="#9C82C9"/>
    <text x="444" y="428" text-anchor="end" font-size="10" fill="#9C82C9" font-family="ui-monospace, Menlo, monospace">耦合 0.66</text>
  </g>

  <!-- Layer L3 : 外置检索 -->
  <g>
    <rect x="56" y="470" width="404" height="78" rx="4" fill="url(#strataC)" stroke="#7E70B0" stroke-width="1" stroke-opacity="0.55"/>
    <text x="72" y="498" font-size="22" font-weight="700" fill="#F2EFE6" font-family="Songti SC, Noto Serif SC, serif">外置检索</text>
    <text x="72" y="520" font-size="11.5" fill="#A6AFC9" font-family="PingFang SC, Noto Sans SC, sans-serif">向量库取回 · 按需注入 · 可增删可溯源</text>
    <text x="72" y="538" font-size="10" letter-spacing="1" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">L3 · RETRIEVAL · RAG / embeddings</text>
    <rect x="370" y="492" width="74" height="7" rx="3.5" fill="#2A3350"/>
    <rect x="370" y="492" width="26" height="7" rx="3.5" fill="#6E63A0"/>
    <text x="444" y="518" text-anchor="end" font-size="10" fill="#6E63A0" font-family="ui-monospace, Menlo, monospace">耦合 0.35</text>
  </g>

  <!-- Layer L4 : 知识图谱 -->
  <g>
    <rect x="56" y="560" width="404" height="78" rx="4" fill="url(#strataD)" stroke="#5A5488" stroke-width="1" stroke-opacity="0.5"/>
    <text x="72" y="588" font-size="22" font-weight="700" fill="#F2EFE6" font-family="Songti SC, Noto Serif SC, serif">知识图谱</text>
    <text x="72" y="610" font-size="11.5" fill="#A6AFC9" font-family="PingFang SC, Noto Sans SC, sans-serif">实体与关系结构化 · 可推理 · 完全外置自治</text>
    <text x="72" y="628" font-size="10" letter-spacing="1" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">L4 · GRAPH · entities / edges</text>
    <rect x="370" y="582" width="74" height="7" rx="3.5" fill="#2A3350"/>
    <rect x="370" y="582" width="11" height="7" rx="3.5" fill="#4A4570"/>
    <text x="444" y="608" text-anchor="end" font-size="10" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">耦合 0.15</text>

    <g stroke="#7E70B0" stroke-width="1" fill="#A98BE0">
      <line x1="300" y1="600" x2="324" y2="588"/>
      <line x1="300" y1="600" x2="324" y2="616"/>
      <line x1="324" y1="588" x2="348" y2="604"/>
      <line x1="324" y1="616" x2="348" y2="604"/>
      <circle cx="300" cy="600" r="3"/>
      <circle cx="324" cy="588" r="3"/>
      <circle cx="324" cy="616" r="3"/>
      <circle cx="348" cy="604" r="3"/>
    </g>
  </g>

  <!-- connective spine -->
  <g stroke="#A98BE0" stroke-width="1" stroke-dasharray="2 3" opacity="0.45">
    <path d="M250 368 L250 380" />
    <path d="M250 458 L250 470" />
    <path d="M250 548 L250 560" />
  </g>

  <!-- right edge annotation -->
  <text x="470" y="318" text-anchor="end" font-size="9.5" fill="#4E5878" font-family="ui-monospace, Menlo, monospace" transform="rotate(90 470 318)">FUSED 内嵌</text>
  <text x="470" y="588" text-anchor="end" font-size="9.5" fill="#4E5878" font-family="ui-monospace, Menlo, monospace" transform="rotate(90 470 588)">EXTERNAL 外置</text>

  <!-- footer -->
  <line x1="40" y1="700" x2="460" y2="700" stroke="#2A3350" stroke-width="1"/>
  <text x="40" y="730" font-size="12.5" fill="#8E97B3" font-family="ui-monospace, Menlo, monospace">深度解析 · 四层 · 2026</text>
  <text x="460" y="730" text-anchor="end" font-size="11" fill="#6E7790" font-family="ui-monospace, Menlo, monospace">∇ coupling 1.00 → 0.15</text>
  <text x="40" y="758" font-size="13" fill="#6E7790" font-family="PingFang SC, Noto Sans SC, sans-serif">Rick's Opus 4.6 Max</text>
</svg>
