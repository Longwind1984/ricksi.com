<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200" role="img" aria-label="Galaxy View 缩略图：发光的 3D 知识星系">
  <defs>
    <radialGradient id="gv-bg" cx="50%" cy="42%" r="75%">
      <stop offset="0" stop-color="#0c1838"/>
      <stop offset="0.55" stop-color="#070d20"/>
      <stop offset="1" stop-color="#04081a"/>
    </radialGradient>
    <radialGradient id="gv-core" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.32" stop-color="#f0cf7a"/>
      <stop offset="0.7" stop-color="#caa64a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#caa64a" stop-opacity="0"/>
    </radialGradient>
    <filter id="gv-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="200" fill="url(#gv-bg)"/>

  <!-- 背景星点 -->
  <g fill="#aebfe0">
    <circle cx="36" cy="30" r="0.8" opacity="0.7"/>
    <circle cx="372" cy="44" r="1" opacity="0.6"/>
    <circle cx="60" cy="168" r="0.9" opacity="0.55"/>
    <circle cx="338" cy="150" r="0.8" opacity="0.6"/>
    <circle cx="120" cy="22" r="0.7" opacity="0.5"/>
    <circle cx="280" cy="176" r="0.8" opacity="0.5"/>
    <circle cx="18" cy="96" r="0.7" opacity="0.5"/>
    <circle cx="390" cy="108" r="0.8" opacity="0.5"/>
  </g>

  <!-- 倾斜的星系盘 -->
  <g transform="rotate(-20 200 100)">
    <ellipse cx="200" cy="100" rx="150" ry="44" fill="none" stroke="#5e79c8" stroke-opacity="0.16" stroke-width="1"/>
    <ellipse cx="200" cy="100" rx="104" ry="30" fill="none" stroke="#5e79c8" stroke-opacity="0.13" stroke-width="1"/>
    <ellipse cx="200" cy="100" rx="58" ry="17" fill="none" stroke="#7d93da" stroke-opacity="0.12" stroke-width="1"/>

    <!-- 旋臂节点 -->
    <g filter="url(#gv-glow)">
      <circle cx="62"  cy="96"  r="1.6" fill="#9fb6e6" opacity="0.85"/>
      <circle cx="92"  cy="78"  r="2"   fill="#6f8cf0" opacity="0.9"/>
      <circle cx="120" cy="70"  r="1.5" fill="#cdd9f2" opacity="0.8"/>
      <circle cx="150" cy="68"  r="2.6" fill="#7e9bff"/>
      <circle cx="176" cy="74"  r="1.4" fill="#aebfe0" opacity="0.8"/>
      <circle cx="244" cy="128" r="1.5" fill="#9fb6e6" opacity="0.85"/>
      <circle cx="276" cy="124" r="2.2" fill="#6f8cf0" opacity="0.9"/>
      <circle cx="306" cy="116" r="1.5" fill="#cdd9f2" opacity="0.8"/>
      <circle cx="330" cy="104" r="2.4" fill="#7e9bff"/>
      <circle cx="108" cy="118" r="1.5" fill="#8aa0dd" opacity="0.8"/>
      <circle cx="140" cy="128" r="2"   fill="#f0cf7a"/>
      <circle cx="232" cy="74"  r="2"   fill="#f0cf7a"/>
      <circle cx="262" cy="80"  r="1.4" fill="#aebfe0" opacity="0.8"/>
      <circle cx="170" cy="124" r="1.6" fill="#02bfe7" opacity="0.85"/>
      <circle cx="210" cy="62"  r="1.4" fill="#cdd9f2" opacity="0.8"/>
      <circle cx="196" cy="138" r="1.5" fill="#8aa0dd" opacity="0.75"/>
      <circle cx="84"  cy="112" r="1.3" fill="#aebfe0" opacity="0.7"/>
      <circle cx="320" cy="86"  r="1.4" fill="#aebfe0" opacity="0.7"/>
    </g>

    <!-- 核心 -->
    <circle cx="200" cy="100" r="34" fill="url(#gv-core)"/>
    <circle cx="200" cy="100" r="4.4" fill="#fff8e6" filter="url(#gv-glow)"/>
  </g>
</svg>
