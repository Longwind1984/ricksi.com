<!-- @dsCard group="Brand" viewport="700x160" name="Monogram · 标识" subtitle="R favicon monogram + CJK/EN wordmark" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; }
  .row { display: flex; align-items: center; gap: 26px; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 8px; }
  .cell { text-align: center; }
</style>
</head>
<body>
<div class="page">
  <div class="row">
    <div class="cell">
      <img src="../assets/favicon.svg" alt="R monogram favicon" width="56" height="56" style="display: block; margin: 0 auto;" />
      <div class="name">favicon.svg</div>
    </div>
    <div class="cell">
      <a class="reader-home" href="#" onclick="return false" style="position: static;">R</a>
      <div class="name">.reader-home · 阅读页 44px</div>
    </div>
    <div class="cell">
      <span class="brand" style="font-size: 22px;">司豪杰 Rick Si</span>
      <div class="name">.brand · 中文名 + 英文名连写</div>
    </div>
    <div class="cell">
      <img src="../assets/apple-touch-icon.png" alt="touch icon" width="56" height="56" style="display: block; margin: 0 auto; border-radius: 12px;" />
      <div class="name">apple-touch-icon.png</div>
    </div>
  </div>
</div>
</body>
</html>
