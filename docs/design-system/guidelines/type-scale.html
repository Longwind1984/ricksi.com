<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px 28px; }
  .row { display: grid; grid-template-columns: 150px 1fr; gap: 16px; align-items: baseline; padding: 5px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: none; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  .sp { color: var(--ink-2); font-family: var(--font-display); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
<div class="page">
  <div class="row"><span class="tok">--text-hero · 60</span><span class="sp" style="font-size: 38px; font-weight: 700; letter-spacing: -0.02em;">把产品判断</span></div>
  <div class="row"><span class="tok">--text-section · 32</span><span class="sp" style="font-size: 32px; font-weight: 700; letter-spacing: -0.02em;">知识库图谱</span></div>
  <div class="row"><span class="tok">--text-proj-title · 23</span><span class="sp" style="font-size: 23px; font-weight: 650;">行程规划套件</span></div>
  <div class="row"><span class="tok">--text-blog-title · 19</span><span class="sp" style="font-size: 19px; font-weight: 600;">从源码看交互设计</span></div>
  <div class="row"><span class="tok">--text-hero-sub · 17</span><span class="sp" style="font-size: 17px; font-family: var(--font-body); font-weight: 400;">转型 AI 产品经理的活数据工作台</span></div>
  <div class="row"><span class="tok">--text-body · 15.5</span><span class="sp" style="font-size: 15.5px; font-family: var(--font-body); font-weight: 400; color: rgba(236,242,250,0.88);">正文：读源码、建工具、写思考、养知识库。</span></div>
  <div class="row"><span class="tok">--text-small · 12.5</span><span class="sp" style="font-size: 12.5px; font-family: var(--font-body); color: var(--text-sub);">2026.05 · 次级信息与日期</span></div>
  <div class="row"><span class="tok">--text-label · 11.5</span><span class="sp mono" style="font-size: 11.5px; letter-spacing: 0.12em; color: var(--text-sub); font-family: var(--font-mono);">MONO LABEL · 标签</span></div>
  <div class="row"><span class="tok">--text-micro · 10.5</span><span class="sp mono" style="font-size: 10.5px; font-family: var(--font-mono); color: var(--text-faint);">stamps · 徽章 · 落款</span></div>
</div>
</body>
</html>
