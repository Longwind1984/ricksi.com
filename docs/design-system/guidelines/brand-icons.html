<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; }
  .row { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .cell { text-align: center; }
  .name { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-faint); margin-top: 7px; }
  .note { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 14px; line-height: 1.7; }
</style>
</head>
<body>
<div class="page">
  <div class="row" id="icons"></div>
  <div class="note">viewBox 24 · stroke 1.8 · round cap/join · fill none · 容器 .proj-icon 30px 玻璃方 r9 · 无 emoji；UI 箭头用字符 → ↗ ↓ ✕</div>
  <script>
    const I = (paths) => `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths}</svg>`;
    const icons = [
      ['多智能体', I('<circle cx="5" cy="6" r="2.2"/><circle cx="19" cy="6" r="2.2"/><circle cx="5" cy="18" r="2.2"/><circle cx="19" cy="18" r="2.2"/><circle cx="12" cy="12" r="2.6"/><path d="M6.8 7.4 9.9 10.2M17.2 7.4 14.1 10.2M6.8 16.6 9.9 13.8M17.2 16.6 14.1 13.8"/>')],
      ['博物馆', I('<path d="M3 9.5 12 4l9 5.5"/><path d="M5 10v8M9.5 10v8M14.5 10v8M19 10v8"/><path d="M3 20h18"/>')],
      ['终端', I('<rect x="3" y="4" width="18" height="16" rx="3"/><path d="m8 9 3 3-3 3"/><path d="M13 15h4"/>')],
      ['行程', I('<circle cx="6" cy="19" r="2.4"/><circle cx="18" cy="5" r="2.4"/><path d="M8.2 17.5c3.2-1.2 2.4-4.2 0.4-5.4-2.2-1.3-2.6-4 0.8-5M15.6 6.5c-2 0.8-2.6 2.8-1 4.4 1.8 1.8 1.2 4.2-1.4 5.2"/>')],
      ['透镜', I('<circle cx="11" cy="11" r="6.5"/><path d="m20 20-3.8-3.8"/><path d="M8 11.5c0.8-2.6 5.2-2.6 6 0"/><path d="M8.5 9a8 8 0 0 1 5 0"/>')],
      ['搜索', I('<circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/>')],
      ['分享', I('<path d="M12 3v12"/><path d="m7 8 5-5 5 5"/><path d="M5 13v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/>')],
    ];
    document.getElementById('icons').innerHTML = icons.map(([n, svg]) =>
      `<div class="cell"><span class="proj-icon" style="width: 38px; height: 38px; border-radius: 11px;">${svg}</span><div class="name">${n}</div></div>`
    ).join('');
  </script>
</div>
</body>
</html>
