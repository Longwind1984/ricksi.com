<!-- @dsCard group="Colors" viewport="700x210" name="Glass · 钴蓝玻璃配方" subtitle="Cobalt-tinted section, nav capsule & dark card over the photo" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .tile { height: 110px; display: flex; align-items: flex-end; padding: 10px 12px; }
  .lab { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.04em; color: rgba(255,255,255,0.85); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 7px; line-height: 1.6; }
</style>
</head>
<body>
<div class="page">
  <div class="grid">
    <div>
      <div class="tile sec" style="margin: 0; padding: 10px 12px;"><span class="lab">.sec</span></div>
      <div class="name">内容区块 · blur 22 + sat 185% · 钴蓝透色 r28</div>
    </div>
    <div>
      <div class="tile glassy" style="border-radius: var(--r-hero);"><span class="lab">.glassy / hero</span></div>
      <div class="name">亮玻璃 · white 10→4.5% · 左上 rim light</div>
    </div>
    <div>
      <div class="tile" style="border-radius: 999px; height: 52px; margin-top: 29px; background: var(--surface-nav); backdrop-filter: blur(24px) saturate(190%); border: 1px solid var(--glass-border); box-shadow: inset 0 1px 0 var(--glass-rim), 0 10px 36px rgba(2,8,28,0.45); align-items: center;"><span class="lab" style="padding-left: 8px;">.site-head 胶囊</span></div>
      <div class="name">导航 · blur 24 + sat 190% · 钴蓝染色胶囊</div>
    </div>
    <div>
      <div class="tile" style="border-radius: var(--r-card); background: var(--surface-card); border: 1px solid var(--glass-hairline); box-shadow: inset 0 1px 0 rgba(190,210,255,0.08);"><span class="lab">--surface-card</span></div>
      <div class="name">玻璃内的暗卡 · 无 blur · 装图表/封面</div>
    </div>
  </div>
</div>
</body>
</html>
