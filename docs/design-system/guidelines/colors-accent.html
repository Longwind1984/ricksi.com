<body>
<div class="page">
  <div class="row">

    <div>

    </div>
    <div>
      <div class="mono kicker" style="margin-bottom: 4px; font-size: 12px;">AI 时代的思考与足迹</div>
      <span style="font-family: var(--font-mono); font-size: 12px; color: var(--accent-text); letter-spacing: 0.15em;">02 · SEC-NO</span>
      <div class="sub-lab">金 kicker · 群青亮档编号</div>
    </div>
  </div>

</html>
